apiVersion: apps/v1
kind: Deployment
metadata:
  name: prime-controller
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prime-controller
  template:
    metadata:
      labels:
        app: prime-controller
    spec:
      serviceAccountName: prime-controller
      containers:
        - name: controller
          image: localhost/prime-controller:latest
          imagePullPolicy: Never
          env:
            - name: PRIME_API_URL
              value: "http://prime-api:8080"
          ports:
            - containerPort: 8080
              name: healthz
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 30
